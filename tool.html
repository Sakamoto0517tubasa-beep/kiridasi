<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キリダシ — 業務切り出しAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Shippori+Mincho:wght@500;600;700;800&family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f0e6; --panel:#fffdf8; --ink:#1a2430; --ink2:#56616e; --ink3:#929aa4;
    --line:#e2dac8; --line2:#d3c9b2;
    --brand:#1b3a5b; --brand-d:#122a44; --brand-wash:#e9eef4; --brand-deep:#0e2236;
    --red:#b1382f; --red-wash:#f6eae7;
    --blue:#1b3a5b; --blue-wash:#e9eef4;
    --teal:#1f6b54; --teal-wash:#e6f0ea;
    --amber:#9a6512; --amber-wash:#f4ecd9;
    --purple:#5b4a86; --purple-wash:#ece8f2;
    --r:6px; --r-s:5px;
    --serif:"Shippori Mincho",serif;
    --sh-s:0 1px 0 rgba(26,36,48,.04);
    --sh:0 1px 2px rgba(26,36,48,.05),0 6px 18px -10px rgba(26,36,48,.12);
    --sh-lg:0 18px 50px -16px rgba(26,36,48,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"BIZ UDPGothic","Noto Sans JP",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-feature-settings:"palt";line-height:1.7}
  ::selection{background:var(--brand-wash)}
  h1,h2,h2.sec,.hero h1,.rhead h3,.jobspec .ti{font-family:var(--serif)}
  .flabel{display:block;font-size:12.5px;font-weight:700;margin-bottom:9px;color:var(--ink)}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  @media(max-width:560px){.frow{grid-template-columns:1fr}}
  .fld .unit{font-size:11px;color:var(--ink3);margin-left:6px;font-weight:400}
  .fld input{width:100%;border:1.5px solid var(--line2);border-radius:var(--r-s);padding:11px 14px;font-family:inherit;font-size:14px;background:var(--panel);color:var(--ink)}
  .fld input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-wash)}
  .dcards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:560px){.dcards{grid-template-columns:1fr}}
  .dcard{border:1px solid var(--line2);border-radius:var(--r);padding:14px 16px;background:var(--bg)}
  .dcard .dl{font-size:11.5px;color:var(--ink2);margin-bottom:4px}
  .dcard .dv{font-size:23px;font-weight:800;font-family:var(--serif);line-height:1.2}
  .dcard .dv small{font-size:12px;font-weight:600;color:var(--ink2)}
  .dcard.warn{background:var(--red-wash);border-color:#e6c9c5}
  .dcard.warn .dv{color:var(--red)}
  .dmsg{font-size:13.5px;line-height:1.8;color:var(--ink);background:var(--brand-wash);border-left:3px solid var(--brand);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;margin-bottom:18px}
  .dmsg b{color:var(--brand-deep);font-weight:700}
  .jc-score{display:flex;align-items:center;gap:16px;margin:12px 0;padding:12px 16px;background:var(--bg);border-radius:var(--r)}
  .jc-score .sc-box{text-align:center;flex-shrink:0}
  .jc-score .sc-num{font-family:var(--serif);font-size:27px;font-weight:800;color:var(--brand);line-height:1}
  .jc-score .sc-num small{font-size:11px;color:var(--ink2);font-weight:600}
  .jc-score .sc-cap{font-size:10px;color:var(--ink2);font-weight:700;letter-spacing:.04em;margin-top:2px}
  .jc-score .axes{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
  .ax{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--ink2)}
  .ax .axl{width:44px;flex-shrink:0}
  .ax .axt{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
  .ax .axf{height:100%;background:var(--brand);border-radius:3px}
  .pf{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:14px}
  .pfcard{border:1px solid var(--line2);border-radius:var(--r);padding:16px 18px;background:var(--panel);box-shadow:var(--sh-s)}
  .pfcard .pfh{display:flex;align-items:center;gap:11px;margin-bottom:12px;padding-bottom:11px;border-bottom:1px solid var(--line)}
  .pfcard .pfav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex-shrink:0;font-family:var(--serif)}
  .pfcard .pfn{font-weight:700;font-size:14px}
  .pfcard .pft{font-size:11px;color:var(--ink2);margin-top:1px}
  .pfcard ul{margin:0 0 11px;padding-left:18px;font-size:12.5px;line-height:1.75}
  .pfcard .pfhrs{font-size:11.5px;color:var(--ink2);border-top:1px solid var(--line);padding-top:10px;line-height:1.6}
  .pfcard .pfhrs b{color:var(--ink);font-weight:700}
  .heatwrap{overflow-x:auto}
  .heat{width:100%;border-collapse:collapse;font-size:12.5px}
  .heat th,.heat td{border:1px solid var(--line2);padding:9px 10px;text-align:center;background:var(--panel)}
  .heat th{background:var(--bg);font-weight:700;font-size:11.5px}
  .heat td.tn{text-align:left;font-weight:500}
  .heat .cell{display:inline-block;width:26px;height:26px;line-height:26px;border-radius:4px;font-weight:700}
  .heat .c2{background:var(--brand);color:#fff}
  .heat .c1{background:var(--brand-wash);color:var(--brand)}
  .heat .c0{color:var(--ink3)}
  .wrap{max-width:920px;margin:0 auto;padding:0 22px}

  header{background:rgba(244,240,230,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line2);position:sticky;top:0;z-index:20}
  .hbar{display:flex;align-items:center;justify-content:space-between;height:66px}
  .logo{display:flex;align-items:center;gap:12px}
  .logo .mk{width:36px;height:36px;border-radius:4px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:19px;font-family:var(--serif);border:1px solid rgba(0,0,0,.08)}
  .logo .nm{font-weight:700;font-size:19px;letter-spacing:.04em;font-family:var(--serif)}
  .logo .nm span{display:block;font-size:10.5px;font-weight:400;color:var(--ink2);letter-spacing:.06em;font-family:"BIZ UDPGothic",sans-serif}
  .htag{font-size:12px;color:var(--ink2);background:var(--panel);border:1px solid var(--line2);border-radius:var(--r-s);padding:6px 14px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
  .pad{padding:26px}
  .step{font-size:11px;font-weight:700;color:var(--brand);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .step .no{width:20px;height:20px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px}
  h2.sec{font-size:18px;font-weight:700;margin-bottom:4px}
  .sub{font-size:13px;color:var(--ink2);margin-bottom:18px}

  .depts{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:8px}
  .dept{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line2);background:var(--panel);border-radius:11px;padding:11px 15px;font-size:13.5px;font-weight:500;cursor:pointer;transition:.14s;font-family:inherit;color:var(--ink)}
  .dept i{font-size:16px}
  .dept:hover{border-color:var(--brand);background:var(--brand-wash)}
  .dept.on{border-color:var(--brand);background:var(--brand);color:#fff}

  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

  .run{width:100%;border:0;background:var(--brand);color:#fff;font-weight:700;font-size:15px;padding:16px;border-radius:var(--r);cursor:pointer;transition:.16s;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 6px 16px -8px rgba(27,58,91,.5);font-family:inherit;letter-spacing:.04em}
  .run:hover{background:var(--brand-d);transform:translateY(-1px)}
  .run:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .run svg{width:18px;height:18px}

  .analyzing{display:none;text-align:center;padding:50px 0}
  .analyzing.show{display:block}
  .spinner{width:42px;height:42px;border:3px solid var(--brand-wash);border-top-color:var(--brand);border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .analyzing .at{font-size:14px;font-weight:600;color:var(--ink)}
  .analyzing .as{font-size:12.5px;color:var(--ink2);margin-top:5px;min-height:18px}

  #results{display:none}
  #results.show{display:block;animation:fade .4s}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
  @media(max-width:680px){.kpis{grid-template-columns:1fr}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--sh-s);text-align:center}
  .kpi .v{font-size:30px;font-weight:700;letter-spacing:-.02em;font-family:"Inter";color:var(--brand)}
  .kpi .v small{font-size:14px;color:var(--ink2);font-weight:600}
  .kpi .k{font-size:12px;color:var(--ink2);margin-top:3px}

  .jobcard{border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:13px;background:var(--panel);box-shadow:var(--sh-s);transition:.15s}
  .jobcard:hover{box-shadow:var(--sh)}
  .jc-top{display:flex;align-items:flex-start;gap:13px;margin-bottom:12px}
  .jc-ic{width:40px;height:40px;border-radius:11px;background:var(--brand-wash);color:var(--brand-d);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:19px}
  .jc-top .jt{font-weight:600;font-size:15px}
  .jc-top .jf{font-size:11.5px;color:var(--ink3);margin-top:2px}
  .jc-top .diff{margin-left:auto;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px;flex-shrink:0}
  .diff.e{background:var(--teal-wash);color:var(--teal)}
  .diff.m{background:var(--amber-wash);color:var(--amber)}
  .jc-meta{display:flex;flex-wrap:wrap;gap:18px;font-size:12.5px}
  .jc-meta .m .l{font-size:10.5px;color:var(--ink3);font-weight:600;margin-bottom:3px}
  .jc-meta .m .vv{color:var(--ink);font-weight:500}
  .traits{display:flex;gap:5px;flex-wrap:wrap}
  .trait{font-size:11px;font-weight:600;padding:2px 9px;border-radius:6px}
  .trait.mental{background:var(--blue-wash);color:var(--blue)}
  .trait.dev{background:var(--purple-wash);color:var(--purple)}
  .trait.phys{background:var(--teal-wash);color:var(--teal)}
  .trait.intel{background:var(--amber-wash);color:var(--amber)}

  .jobspec{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;box-shadow:var(--sh);margin-top:8px}
  .jobspec .jh{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--line)}
  .jobspec .jh .ti{font-weight:700;font-size:16px}
  .jobspec .jh .badge{margin-left:auto;font-size:11px;background:var(--brand);color:#fff;padding:4px 11px;border-radius:7px;font-weight:600}
  .specrow{display:flex;gap:14px;padding:11px 0;border-bottom:1px dashed var(--line)}
  .specrow:last-child{border:0}
  .specrow .sl{width:96px;flex-shrink:0;font-size:12.5px;color:var(--ink2);font-weight:600}
  .specrow .sv{font-size:13px;flex:1}
  .specrow .sv ul{margin:0;padding-left:18px}
  .specrow .sv li{margin-bottom:3px}
  .copy{margin-top:16px;border:1.5px solid var(--line2);background:var(--panel);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink2);display:inline-flex;align-items:center;gap:7px}
  .copy:hover{border-color:var(--brand);color:var(--brand)}
  .copy svg{width:15px;height:15px}

  .again{display:block;margin:26px auto 0;border:0;background:none;color:var(--ink2);font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit}
  .foot{text-align:center;color:var(--ink3);font-size:11.5px;padding:36px 0 50px;line-height:1.7}
  .rhead{display:flex;align-items:center;gap:10px;margin:30px 0 14px}
  .rhead h3{font-size:15px;font-weight:700}
  .rhead .ln{flex:1;height:1px;background:var(--line)}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:var(--sh-lg);z-index:60;opacity:0;transition:.35s}
  .toast.on{transform:translateX(-50%) translateY(0);opacity:1}
  .jc-why{display:flex;gap:8px;align-items:flex-start;background:var(--brand-wash);border-radius:9px;padding:9px 12px;margin:12px 0;font-size:12.5px;color:var(--brand-deep);line-height:1.5}
  .jc-why b{font-weight:700;flex-shrink:0}
  .steps{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:4px}
  .steps .stp{background:var(--bg);border:1px solid var(--line2);border-radius:7px;padding:4px 10px;font-size:11.5px;color:var(--ink2)}
  .steps .arr{color:var(--ink3);font-size:11px}
  .jc-steplabel{font-size:10.5px;color:var(--ink3);font-weight:600;margin:10px 0 6px}
  .costbar{display:flex;align-items:center;gap:18px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:0 14px 14px 0;padding:18px 22px;margin-bottom:22px;box-shadow:var(--sh-s)}
  .costbar .cb-ic{font-size:26px;flex-shrink:0}
  .costbar .cb-main{flex:1}
  .costbar .cb-line{font-size:13px;color:var(--ink2)}
  .costbar .cb-line b{color:var(--ink);font-weight:700}
  .costbar .cb-old{color:var(--ink3);text-decoration:line-through;font-weight:600}
  .costbar .cb-new{color:var(--brand-d);font-weight:700;font-size:20px;font-family:"Inter",sans-serif}
  .impact{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:22px;box-shadow:var(--sh-s)}
  .impact h4{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
  .impact .igrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:600px){.impact .igrid{grid-template-columns:1fr}}
  .impact .icell{display:flex;gap:11px;align-items:flex-start}
  .impact .icell .ii{width:30px;height:30px;border-radius:8px;background:var(--brand-wash);color:var(--brand-d);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
  .impact .icell .it{font-size:12.5px;line-height:1.5}
  .impact .icell .it b{display:block;color:var(--ink);font-weight:700;margin-bottom:1px}
  .impact .icell .it span{color:var(--ink2)}
  @media print{
    header,#input,#analyzing,.kpis,.costbar,.impact,#jobs,.rhead,.again,.foot,.toast{display:none!important}
    body{background:#fff}
    .jobspec{box-shadow:none;border:1px solid #ccc;margin:0}
    .jobspec .copy,.jobspec .printbtn{display:none!important}
  }
</style>
</head>
<body>
<header>
  <div class="wrap hbar">
    <div class="logo">
      <div class="mk">切</div>
      <div class="nm">キリダシ<span>業務切り出しAI</span></div>
    </div>
    <div class="htag" id="htag">障がい者雇用の「任せる仕事がない」を解決</div>
  </div>
</header>

<main class="wrap">
  <div id="input">
    <!-- 診断結果サマリー -->
    <div class="card pad" id="diagCard" style="margin-bottom:16px;margin-top:24px">
      <div class="step"><span class="no">1</span>御社の状況</div>
      <div class="dcards" id="diagCards"></div>
      <div class="dmsg" id="diagMsg"></div>
      <button class="run" style="margin-top:18px" onclick="document.getElementById('taskCard').scrollIntoView({behavior:'smooth',block:'start'})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        業務を切り出す
      </button>
    </div>

    <div class="card pad" id="taskCard">
      <div class="step"><span class="no">2</span>部署を選ぶ</div>
      <h2 class="sec">御社にはどんな部署がありますか？</h2>
      <p class="sub">部署を選ぶだけでOK。<b>AIが「任せられる業務」を自動で提案します。</b>（複数選択できます）</p>
      <div class="depts" id="depts"></div>
      <button class="run" id="runBtn" onclick="analyze()" disabled style="margin-top:20px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l2.5 2.5M16.5 16.5 19 19M19 5l-2.5 2.5M7.5 16.5 5 19"/><circle cx="12" cy="12" r="3"/></svg>
        AIに任せられる業務を提案してもらう
      </button>
    </div>
  </div>

  <div class="analyzing" id="analyzing">
    <div class="spinner"></div>
    <div class="at">AIが業務を分析しています…</div>
    <div class="as" id="aStep"></div>
  </div>

  <div id="results">
    <div class="kpis" id="kpis"></div>
    <div id="costbar"></div>
    <div id="impact"></div>
    <div class="rhead"><h3>雇用ポートフォリオ設計</h3><div class="ln"></div></div>
    <div id="portfolio"></div>
    <div class="rhead"><h3>障がい特性 × 業務 マッチング</h3><div class="ln"></div></div>
    <div id="heatwrap"></div>
    <div class="rhead"><h3>切り出せる業務</h3><div class="ln"></div></div>
    <div id="jobs"></div>
    <div class="rhead"><h3>AIが作成した求人票</h3><div class="ln"></div></div>
    <div id="spec"></div>
    <button class="again" onclick="reset()">↻ 別の部署で試す</button>
  </div>

  <p class="foot">キリダシ — 業務切り出しAI</p>
</main>

<div class="toast" id="toast">コピーしました</div>

<script>
/* ===== 未登録ガード・企業名表示 ===== */
(function(){
  const raw=localStorage.getItem('kiridashi_company');
  if(!raw){location.href='index.html';return;}
  const co=JSON.parse(raw);
  if(co.companyName) document.getElementById('htag').textContent=co.companyName;
})();

/* ===== 業務ナレッジベース ===== */
const TRAIT={mental:['精神','mental'],dev:['発達','dev'],phys:['身体','phys'],intel:['知的','intel']};
const TLABEL={mental:'精神',dev:'発達',phys:'身体',intel:'知的'};
const DEPTS={
  '経理・財務':{icon:'🧮',tasks:[
    {n:'請求書の処理',sub:'紙の請求書をスキャン→PDF化→会計ソフトへデータ入力',diff:'e',traits:['mental','dev'],care:'入力手順書を用意し、ダブルチェック体制にする',hrs:6,why:'毎月決まった形式の繰り返し作業で、判断より正確さが求められるため'},
    {n:'経費精算のチェック',sub:'領収書と申請内容の突合→不備チェック→差し戻し',diff:'m',traits:['dev'],care:'チェック項目をリスト化、判断に迷う例を事前共有',hrs:4,why:'チェック項目が明確で、ルール化すれば判断のブレが少ないため'},
    {n:'伝票の仕分け・ファイリング',sub:'伝票を日付で分類→種別で分類→綴じる',diff:'e',traits:['intel','dev'],care:'分類ラベルを色分けして視覚的に',hrs:3,why:'分類ルールが固定的で、視覚的に整理できる単純作業のため'},
    {n:'入金消込',sub:'入金データを抽出→請求と照合→消込',diff:'m',traits:['dev','mental'],care:'手順を固定化、イレギュラーは担当者へエスカレ',hrs:4,why:'照合作業が中心で、手順を固定すれば反復対応できるため'}
  ]},
  '総務':{icon:'📋',tasks:[

function stepsOf(sub){return sub.split(/[→/／・]/).map(s=>s.trim()).filter(Boolean);}

const AX=[['定型度','routine'],['反復性','repeat'],['独立性','indep'],['低対人','lowsoc'],['低判断','lowjud']];
function axesOf(t){
  const e=t.diff==='e', name=t.n+t.sub;
  const has=(...k)=>k.some(x=>name.includes(x));
  const social=has('メール','問い合わせ','返信','電話','受付','対応','顧客','アンケート');
  const judge=has('チェック','精算','照合','判断','エラー','検品','クレンジング','テスト','点検','不備');
  return {
    routine: e?5:4,
    repeat: has('入力','仕分け','検品','梱包','ピッキング','集計','スキャン','補充','清掃','カウント','整理','貼')?5:(e?4:3),
    indep: social?2:5,
    lowsoc: social?1:5,
    lowjud: e?(judge?3:5):(judge?2:3)
  };
}
function scoreOf(t){const a=axesOf(t);return Math.round((a.routine+a.repeat+a.indep+a.lowsoc+a.lowjud)/5*20);}

const TCOL={mental:'var(--blue)',dev:'var(--purple)',phys:'var(--teal)',intel:'var(--amber)'};
function buildPortfolio(jobs,N){
  N=Math.max(1,N);
  const sorted=jobs.slice().sort((a,b)=>(a.traits[0]<b.traits[0]?-1:1));
  const staff=Array.from({length:N},()=>({tasks:[],hrs:0}));
  sorted.forEach(t=>{const best=staff.reduce((a,b)=>a.hrs<=b.hrs?a:b);best.tasks.push(t);best.hrs+=t.hrs;});
  staff.forEach(s=>{
    const c={};s.tasks.forEach(t=>t.traits.forEach(tr=>c[tr]=(c[tr]||0)+1));
    s.trait=Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||'mental';
    s.cares=[...new Set(s.tasks.map(t=>t.care))];
  });
  return staff.filter(s=>s.tasks.length);
}

function buildHeat(jobs){
  const cols=[['mental','精神'],['dev','発達'],['phys','身体'],['intel','知的']];
  let h=`<table class="heat"><tr><th style="text-align:left">業務</th>${cols.map(c=>`<th>${c[1]}</th>`).join('')}</tr>`;
  jobs.forEach(t=>{
    h+=`<tr><td class="tn">${t.n}</td>`+cols.map(c=>{
      const on=t.traits.includes(c[0]), strong=on&&t.traits[0]===c[0];
      return `<td><span class="cell ${strong?'c2':on?'c1':'c0'}">${strong?'◎':on?'○':'—'}</span></td>`;
    }).join('')+`</tr>`;
  });
  return h+`</table>`;
}

  const pf=buildPortfolio(jobs,N);
  document.getElementById('portfolio').innerHTML=
    `<p style="font-size:12.5px;color:var(--ink2);margin:-4px 0 14px">不足を埋める <b style="color:var(--ink)">${pf.length}名分</b> の業務を、障がい特性に合わせて自動編成しました。</p>
     <div class="pf">`+pf.map((s,i)=>`
      <div class="pfcard">
        <div class="pfh"><div class="pfav" style="background:${TCOL[s.trait]}">${i+1}</div><div><div class="pfn">想定スタッフ ${i+1}</div><div class="pft">${TLABEL[s.trait]}障がいの方向け</div></div></div>
        <ul>${s.tasks.map(t=>`<li>${t.n}</li>`).join('')}</ul>
        <div class="pfhrs">週 <b>${s.hrs}h</b> 相当<br>主な配慮：${s.cares[0]||'手順書を用意'}</div>
      </div>`).join('')+`</div>`;
  document.getElementById('heatwrap').innerHTML=`<div class="heatwrap">${buildHeat(jobs)}</div>
    <p style="font-size:11px;color:var(--ink3);margin-top:10px">◎ 特に向く ／ ○ 向く ／ — 要検討</p>`;

  document.getElementById('jobs').innerHTML=jobs.map(t=>{
    const steps=stepsOf(t.sub);
    const stepsHtml=steps.length>1?`<div class="jc-steplabel">工程分解</div><div class="steps">${steps.map((s,i)=>`${i?'<span class="arr">→</span>':''}<span class="stp">${s}</span>`).join('')}</div>`:'';
    const sc=scoreOf(t),ax=axesOf(t);
    const axHtml=AX.map(([lb,k])=>`<div class="ax"><span class="axl">${lb}</span><span class="axt"><span class="axf" style="width:${ax[k]*20}%"></span></span></div>`).join('');
    return `
    <div class="jobcard">
      <div class="jc-top">
        <div class="jc-ic">${t._icon||'🧩'}</div>
        <div><div class="jt">${t.n}</div><div class="jf">${t.sub}</div></div>
        <span class="diff ${t.diff}">${t.diff==='e'?'難易度：易':'難易度：中'}</span>
      </div>
      <div class="jc-why"><b>なぜ切り出せる？</b><span>${t.why||'手順を定型化すれば繰り返し任せられるため'}</span></div>
      <div class="jc-score"><div class="sc-box"><div class="sc-num">${sc}<small>/100</small></div><div class="sc-cap">切り出し適性</div></div><div class="axes">${axHtml}</div></div>
      ${stepsHtml}
      <div class="jc-meta">
        <div class="m"><div class="l">向く特性</div><div class="traits">${t.traits.map(tr=>`<span class="trait ${tr}">${TLABEL[tr]}</span>`).join('')}</div></div>
        <div class="m"><div class="l">必要な配慮</div><div class="vv">${t.care}</div></div>
        <div class="m"><div class="l">想定時間</div><div class="vv">約 ${t.hrs}h／週</div></div>
      </div>
    </div>`;}).join('');

  const allTraits=[...new Set(jobs.flatMap(t=>t.traits))];
  const allCare=[...new Set(jobs.map(t=>t.care))];
  const totalH=jobs.reduce((s,t)=>s+t.hrs,0);
  const days=Math.max(2,Math.min(5,Math.round(totalH/6)));
  document.getElementById('spec').innerHTML=`
    <div class="jobspec" id="jobspec">
      <div class="jh"><span style="font-size:20px">📄</span><span class="ti">${company.industry||'バックオフィス'}　サポートスタッフ</span><span class="badge">AI自動生成</span></div>
      <div class="specrow"><div class="sl">職種</div><div class="sv">バックオフィス・現場業務サポート（障がい者雇用枠）</div></div>
      <div class="specrow"><div class="sl">雇用形態</div><div class="sv">契約社員／パート（正社員登用あり・相談可）</div></div>
      <div class="specrow"><div class="sl">主な業務</div><div class="sv"><ul>${jobs.map(t=>`<li>${t.n} — ${t.sub}</li>`).join('')}</ul></div></div>
      <div class="specrow"><div class="sl">勤務時間</div><div class="sv">週 ${totalH} 時間程度／週${days}日（短時間勤務・通院日の調整可）</div></div>
      <div class="specrow"><div class="sl">向いている方</div><div class="sv">${allTraits.map(tr=>TLABEL[tr]).join('・')}障がいのある方／コツコツ正確に取り組める方</div></div>
      <div class="specrow"><div class="sl">提供する配慮</div><div class="sv"><ul>${allCare.map(c=>`<li>${c}</li>`).join('')}</ul></div></div>
      <div class="specrow"><div class="sl">応募方法</div><div class="sv">本求人票をハローワーク・障がい者求人媒体に掲載してご応募を受け付けます。</div></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="copy" onclick="copySpec()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>求人票をコピー</button>
        <button class="copy printbtn" onclick="window.print()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>印刷・PDF保存</button>
      </div>
    </div>`;

  document.getElementById('results').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function copySpec(){
  const jobs=taskList;
  const txt=`【${company.industry||'バックオフィス'} サポートスタッフ（障がい者雇用枠）】\n\n■主な業務\n`+jobs.map(t=>`・${t.n}：${t.sub}`).join('\n')+`\n\n■勤務時間\n週${jobs.reduce((s,t)=>s+t.hrs,0)}時間程度（短時間勤務・相談可）\n\n■提供する配慮\n`+[...new Set(jobs.map(t=>t.care))].map(c=>`・${c}`).join('\n');
  navigator.clipboard.writeText(txt).then(()=>{const t=document.getElementById('toast');t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);});
}
function reset(){
  document.getElementById('results').classList.remove('show');
  document.getElementById('input').style.display='block';
  document.querySelectorAll('.dept').forEach(b=>b.classList.remove('on'));
  selectedDepts=[];taskList=[];
  document.getElementById('runBtn').disabled=true;
  document.getElementById('taskCard').scrollIntoView({behavior:'smooth',block:'start'});
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);}
</script>
</body>
</html>
